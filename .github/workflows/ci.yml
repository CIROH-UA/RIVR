name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [development, main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create CI stub files
        run: |
          cp lib/firebase_options.ci.dart lib/firebase_options.dart
          cp lib/core/config.template.dart lib/core/config.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
